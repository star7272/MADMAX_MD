<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADMAX-MD🇰🇪</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#ff0066;
    filter:blur(120px);
    top:10%;
    left:15%;
}

body::after{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#6a00ff;
    filter:blur(120px);
    bottom:10%;
    right:15%;
}

.card{
    position:relative;
    z-index:1;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    padding:40px;
    width:90%;
    max-width:420px;
    text-align:center;
    color:#fff;
    box-shadow:0 0 30px rgba(255,0,120,.4);
}

h1{
    font-size:45px;
    color:#ff0066;
    text-shadow:0 0 15px #ff0066;
    margin-bottom:15px;
}

p{
    color:#ddd;
    margin-bottom:30px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(90deg,#ff0066,#ff6600);
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #ff0066;
}
</style>
</head>

<body>

Open System
</button>

</div>

</body>
</html>
